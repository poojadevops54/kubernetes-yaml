apiVersion: v1
kind: Pod
metadata:
- name: myPod4
labels:
app: myPod4
spec:
containers:
name: myPod4
image: poojadevops54/b20:httpd-app
ports:
- containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
name: mypod4-Service
spec:
type: NodePort
selector:
app: mypod4
ports:
- name: http
protocol: TCP
port: 80
targetPort: 80
